services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: reviews_user
      POSTGRES_PASSWORD: reviews_password
      POSTGRES_DB: reviews_db
    ports: ["5432:5432"]
    volumes: ["postgres_data:/var/lib/postgresql/data"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U reviews_user -d reviews_db"]
      interval: 5s
      timeout: 5s
      retries: 10
  api:
    build: .
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000
    environment:
      DATABASE_URL: postgresql://reviews_user:reviews_password@postgres:5432/reviews_db
      AUTH_ENABLED: "true"
      AUTH_SECRET_KEY: "dev-secret-key-change-in-production"
    ports: ["8000:8000"]
    depends_on:
      postgres:
        condition: service_healthy
    volumes: ["hf_cache:/home/appuser/.cache/huggingface"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 10
  dashboard:
    build: .
    command: streamlit run dashboard/app.py --server.address=0.0.0.0
    environment:
      API_BASE_URL: http://api:8000
    ports: ["8501:8501"]
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  hf_cache:
