version: '3.9'

# Production Docker Compose Configuration
# Usage: docker-compose -f docker-compose.prod.yml up -d
#
# Prerequisites:
# - Create .env.production with all required variables
# - Ensure PostgreSQL credentials and secrets are properly set
# - Configure SSL certificates for HTTPS
# - Set up proper backup storage

services:
  postgres:
    image: postgres:16-alpine
    container_name: review_engine_postgres
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-reviews_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME:-reviews_db}
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - postgres_backup:/var/backups/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-reviews_user} -d ${DB_NAME:-reviews_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - review_engine_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: review_engine_redis
    restart: always
    command: redis-server --appendonly yes
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - review_engine_network

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review_engine_api
    restart: always
    command: >
      sh -c "alembic upgrade head &&
      python scripts/init_production.py --skip-admin &&
      uvicorn api.main:app --host 0.0.0.0 --port 8000 --workers 4"
    environment:
      APP_ENV: ${APP_ENV:-production}
      DEBUG: ${DEBUG:-false}
      DATABASE_URL: postgresql://${DB_USER:-reviews_user}:${DB_PASSWORD}@postgres:5432/${DB_NAME:-reviews_db}
      REDIS_URL: redis://redis:6379/0
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY}
      AUTH_ALGORITHM: ${AUTH_ALGORITHM:-HS256}
      AUTH_ACCESS_TOKEN_EXPIRE_MINUTES: ${AUTH_ACCESS_TOKEN_EXPIRE_MINUTES:-30}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-all-MiniLM-L6-v2}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-32}
      CLUSTERING_N_THEMES: ${CLUSTERING_N_THEMES:-8}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      PROMETHEUS_METRICS_ENABLED: ${PROMETHEUS_METRICS_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - hf_cache:/home/appuser/.cache/huggingface
      - ./logs:/var/log/review_engine
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - review_engine_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: review_engine_dashboard
    restart: always
    command: streamlit run dashboard/app.py --server.address=0.0.0.0 --server.port=8501 --logger.level=info
    environment:
      API_BASE_URL: ${API_BASE_URL:-http://api:8000}
      STREAMLIT_SERVER_HEADLESS: "true"
      STREAMLIT_LOGGER_LEVEL: "info"
    ports:
      - "8501:8501"
    depends_on:
      api:
        condition: service_healthy
    networks:
      - review_engine_network
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  prometheus:
    image: prom/prometheus:latest
    container_name: review_engine_prometheus
    restart: always
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    networks:
      - review_engine_network

  grafana:
    image: grafana/grafana:latest
    container_name: review_engine_grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ./monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    depends_on:
      - prometheus
    networks:
      - review_engine_network

volumes:
  postgres_data:
    driver: local
  postgres_backup:
    driver: local
  redis_data:
    driver: local
  hf_cache:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  review_engine_network:
    driver: bridge
